services:
  deepwiki:
    build: .
    ports:
      - "8001:8001"  # API port
      - "3000:3000"  # Next.js port
    env_file:
      - .env
    environment:
      - PORT=8001
      - NODE_ENV=production
    volumes:
      - ~/.adalflow:/root/.adalflow  # Persist repository and embedding data
      - ./data:/data
      - ~/code_sandbox/edna_phm_sow_airflow_antigravity:/cah-sow:ro
      - ~/code_sandbox/2026-PayerPropensity-Models-days_to_payment_payment_ratio:/vht-ppm:ro
